<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-success text-white text-center">
                    <h4>📝 Signup</h4>
                </div>

                <div class="card-body">

                    <form action="/signup" method="post">

                        <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>

                        <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>

                        <input type="text" name="phone" class="form-control mb-3" placeholder="Phone" required>

                        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

                        <select name="role" class="form-select mb-3" required>
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                        </select>

                        <button class="btn btn-success w-100">Signup</button>

                    </form>

                    <p class="text-danger mt-2 text-center" th:text="${error}"></p>

                    <div class="text-center mt-3">
                        <a href="/login">Already have account?</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
