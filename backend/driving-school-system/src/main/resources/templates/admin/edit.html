<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-warning">
            <h4>✏️ Edit Admin</h4>
        </div>

        <div class="card-body">

            <form action="/admin/edit" method="post">

                <input type="hidden" name="id" th:value="${admin.id}">

                <input type="text" name="name" class="form-control mb-3" th:value="${admin.name}" required>

                <input type="email" name="email" class="form-control mb-3" th:value="${admin.email}" required>

                <input type="text" name="phone" class="form-control mb-3" th:value="${admin.phone}" required>

                <input type="password" name="password" class="form-control mb-3" th:value="${admin.password}" required>

                <select name="role" class="form-select mb-3">
                    <option th:each="r : ${roles}"
                            th:value="${r}"
                            th:text="${r}"
                            th:selected="${r == admin.role}">
                    </option>
                </select>

                <select name="status" class="form-select mb-3">
                    <option value="ACTIVE" th:selected="${admin.status == 'ACTIVE'}">ACTIVE</option>
                    <option value="INACTIVE" th:selected="${admin.status == 'INACTIVE'}">INACTIVE</option>
                </select>

                <button class="btn btn-warning w-100">Update</button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
