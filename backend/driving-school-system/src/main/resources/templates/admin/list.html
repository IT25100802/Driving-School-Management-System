<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between">
        <h3>👥 Admin List</h3>
        <a href="/admin/register" class="btn btn-success">+ Add Admin</a>
    </div>

    <br>

    <table class="table table-bordered">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        <tr th:each="admin : ${admins}">
            <td th:text="${admin.id}"></td>
            <td th:text="${admin.name}"></td>
            <td th:text="${admin.email}"></td>
            <td th:text="${admin.phone}"></td>
            <td th:text="${admin.role}"></td>
            <td th:text="${admin.status}"></td>

            <td>
                <a th:href="@{/admin/edit/{id}(id=${admin.id})}" class="btn btn-warning btn-sm">Edit</a>
                <a th:href="@{/admin/delete/{id}(id=${admin.id})}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
